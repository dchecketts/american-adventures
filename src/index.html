<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>American Adventures</title>
    
    <script type="module" src="scripts/headerFooter.js"></script>
    <script type="module" src="scripts/main.js"></script>

    <!-- Optionally link to the tailwind sheet -->
    <link rel="stylesheet" href="styles/tailwind.css"/>
    <link rel="stylesheet" href="styles/main.css"/>
  </head>
  <body class="flex min-h-screen w-full flex-col bg-gray-100">
  <header class="bg-lime-900 p-4 text-center text-white md:p-10"></header>
    <main class="grow px-3 py-4 md:px-6">
      <div id="search-area" class="mx-auto flex w-full max-w-5xl flex-col gap-2 sm:flex-row sm:items-center">
        <label for="search" class="sr-only">Search parks by name</label>
        <input
          id="search"
          type="text"
          class="w-full transform rounded-sm border-2 border-black bg-gray-50 px-3 py-2 text-gray-800 shadow-sm transition duration-300 focus:scale-105 focus:bg-gray-200 focus:text-black focus:shadow-md focus:outline-0"
          placeholder="Yellowstone"
        />
        <div class="sm:min-w-28">
          <button
            id="search-submit"
            type="submit"
            aria-label="Search"
            class="w-full transform rounded-sm bg-gray-600 px-3 py-2 text-white shadow-sm transition duration-300 hover:scale-105 hover:bg-gray-400 hover:text-gray-100 hover:shadow-md focus:scale-105 focus:bg-gray-400 focus:shadow-md focus:outline-0"
          >
            Search
          </button>
        </div>
      </div>

      <section
        id="filters-panel"
        class="mx-auto mt-3 flex w-full max-w-5xl flex-wrap items-end gap-3 rounded-md bg-white p-4 shadow-sm"
      >
        <div class="min-w-44 flex-1">
          <label for="theme-filter" class="mb-1 block text-sm font-semibold text-gray-700">Theme</label>
          <select id="theme-filter" class="w-full rounded-md border border-gray-300 bg-white px-2 py-2 text-sm">
            <option value="">All themes</option>
          </select>
        </div>
        <div class="min-w-44 flex-1">
          <label for="activity-filter" class="mb-1 block text-sm font-semibold text-gray-700">Activity</label>
          <select id="activity-filter" class="w-full rounded-md border border-gray-300 bg-white px-2 py-2 text-sm">
            <option value="">All activities</option>
          </select>
        </div>
        <div class="min-w-32 flex-1">
          <label for="state-filter" class="mb-1 block text-sm font-semibold text-gray-700">State</label>
          <select id="state-filter" class="w-full rounded-md border border-gray-300 bg-white px-2 py-2 text-sm">
            <option value="">All states</option>
          </select>
        </div>

        <div class="w-full">
          <div class="mb-1 flex items-center justify-between text-sm font-semibold text-gray-700">
            <label for="price-min">Admission range</label>
            <span id="price-range-label" class="text-xs text-gray-600">$0 - $200</span>
          </div>
          <div id="price-slider" class="dual-range">
            <input
              id="price-min"
              type="range"
              min="0"
              max="200"
              value="0"
              step="1"
              class="dual-range__input"
              aria-label="Minimum admission price"
            />
            <input
              id="price-max"
              type="range"
              min="0"
              max="200"
              value="200"
              step="1"
              class="dual-range__input"
              aria-label="Maximum admission price"
            />
          </div>
        </div>

        <button
          id="clear-filters"
          type="button"
          class="rounded-md border border-gray-400 px-3 py-2 text-sm font-semibold text-gray-700 transition hover:bg-gray-100"
        >
          Clear filters
        </button>
      </section>

      <p id="home-action-feedback" aria-live="polite" class="mx-auto mt-3 w-full max-w-5xl text-right text-sm text-gray-600"></p>
      <p id="search-context-banner" class="mx-auto mt-2 hidden w-full max-w-5xl rounded-md border border-lime-200 bg-lime-50 px-3 py-2 text-sm text-lime-900"></p>
      <div id="search-loading" class="mx-auto mt-3 hidden w-full max-w-5xl items-center gap-2 text-sm text-gray-700" aria-live="polite" aria-busy="false">
        <span class="loading-dot" aria-hidden="true"></span>
        <span>Searching parks...</span>
      </div>

      <section
        id="search-results"
        class="mx-auto my-8 flex h-fit w-full max-w-5xl flex-col gap-5"
      >
        <p class="text-sm text-gray-600">Search for a park to see results.</p>
      </section>

      <section class="saved-parks-section mx-auto mb-10 w-full max-w-5xl">
        <h2 class="mb-3 text-2xl font-bold">Saved Parks</h2>
        <div id="saved-parks-results" class="flex flex-col gap-5">
          <p class="text-sm text-gray-600">You have not saved any parks yet.</p>
        </div>
      </section>
    </main>
  <footer class="bg-stone-600 p-5 text-center font-semibold text-white"></footer>
  </body>
</html>
