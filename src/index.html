<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>American Adventures</title>
    
    <script type="module" src="scripts/headerFooter.js"></script>
    <script type="module" src="scripts/main.js"></script>

    <!-- Optionally link to the tailwind sheet -->
    <link rel="stylesheet" href="styles/tailwind.css"/>
    <link rel="stylesheet" href="styles/main.css"/>
  </head>
  <body class="flex min-h-screen w-full flex-col bg-surface text-text-primary">
  <header class="bg-cta-hover p-4 text-center text-white md:p-10"></header>
  <main class="grow px-3 py-4 md:px-6">
    <form action="">
      <section
              id="search-area"
              class="mx-auto flex w-full max-w-5xl flex-col md:flex-row gap-2 items-center"
      >
        <label
                for="search"
                class="sr-only"
        >Search parks by name</label>
        <input
                type="text"
                name="search"
                id="search"
                placeholder="Yellowstone"
                class="w-full rounded-sm border-2 border-border-strong bg-surface-elevated px-3 py-2 text-text-primary shadow-sm focus:transform focus:transition focus:duration-300 focus:scale-105 focus:bg-surface-subtle focus:text-text-primary focus:shadow-md md:w-2/3"
        >
        <button
                id="search-submit"
                type="submit"
                aria-label="Search"
                class="w-full transform rounded-sm bg-cta px-3 py-2 text-white shadow-sm transition duration-300 hover:scale-105 hover:bg-cta-hover hover:shadow-md focus:scale-105 focus:bg-cta-hover focus:shadow-md min-w-28 md:w-1/3"
        >Search
        </button>
      </section>
      <section id="filters-panel"
               class="mx-auto mt-3 flex w-full max-w-5xl flex-wrap items-end gap-3 rounded-md border border-border-subtle bg-surface-elevated p-4 shadow-sm">
        <div class="min-w-44 flex-1">
          <label for="theme-filter" class="mb-1 block text-sm font-semibold text-text-muted">Theme</label>
          <select
                  id="theme-filter"
                  class="w-full rounded-md border border-border-subtle bg-surface-elevated px-2 py-2 text-sm text-text-primary">
            <option value="">All themes</option>
          </select>
        </div>
        <div class="min-w-44 flex-1">
          <label for="activity-filter" class="mb-1 block text-sm font-semibold text-text-muted">Activity</label>
          <select id="activity-filter"
                  class="w-full rounded-md border border-border-subtle bg-surface-elevated px-2 py-2 text-sm text-text-primary">
            <option value="">All activities</option>
          </select>
        </div>
        <div class="min-w-32 flex-1">
          <label for="state-filter" class="mb-1 block text-sm font-semibold text-text-muted">State</label>
          <select id="state-filter"
                  class="w-full rounded-md border border-border-subtle bg-surface-elevated px-2 py-2 text-sm text-text-primary">
            <option value="">All states</option>
          </select>
        </div>
        <div class="w-full">
          <div class="mb-1 flex items-center justify-between text-sm font-semibold text-text-muted">
            <label for="price-min">Admission range</label>
            <span id="price-range-label" class="text-xs text-text-muted">$0 - $200</span>
          </div>
          <div id="price-slider" class="dual-range">
            <input
                    id="price-min"
                    type="range"
                    min="0"
                    max="200"
                    value="0"
                    step="1"
                    class="dual-range__input"
                    aria-label="Minimum admission price"
            />
            <input
                    id="price-max"
                    type="range"
                    min="0"
                    max="200"
                    value="200"
                    step="1"
                    class="dual-range__input"
                    aria-label="Maximum admission price"
            />
          </div>
        </div>
        <button
                id="clear-filters"
                type="button"
                class="rounded-md border border-border-strong px-3 py-2 text-sm font-semibold text-text-muted transition hover:bg-surface-subtle"
        >
          Clear filters
        </button>
      </section>
    </form>
    <!--      Start of form -->
    
    <!--    End of form-->
    
    <p id="home-action-feedback" aria-live="polite"
       class="mx-auto mt-3 w-full max-w-5xl text-right text-sm text-text-muted"></p>
    <p id="search-context-banner"
       class="mx-auto mt-2 hidden w-full max-w-5xl rounded-md border border-forest-moss bg-surface-subtle px-3 py-2 text-sm text-cta-hover"></p>
    <div id="search-loading" class="mx-auto mt-3 hidden w-full max-w-5xl items-center gap-2 text-sm text-text-muted"
         aria-live="polite" aria-busy="false">
      <span class="loading-dot" aria-hidden="true"></span>
      <span>Searching parks...</span>
    </div>
    
    <section
            id="search-results"
            class="mx-auto my-8 flex h-fit w-full max-w-5xl flex-col gap-5"
    >
      <p class="text-sm text-text-muted">Search for a park to see results.</p>
    </section>
    
    <section class="saved-parks-section mx-auto mb-10 w-full max-w-5xl">
      <h2 class="mb-3 text-2xl font-bold">Saved Parks</h2>
      <div id="saved-parks-results" class="flex flex-col gap-5">
        <p class="text-sm text-text-muted">You have not saved any parks yet.</p>
      </div>
      </section>
    </main>
  <footer class="bg-border-strong p-5 text-center font-semibold text-white"></footer>
  </body>
</html>
